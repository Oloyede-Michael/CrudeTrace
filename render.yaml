services:
  - type: web
    name: crudetrace-notifier
    env: node
    region: oregon
    plan: free
    buildCommand: "cd crudetrace_notifier && npm install"
    startCommand: "cd crudetrace_notifier && npm start"
    envVars:
      - key: SEPOLIA_RPC_URL
        scope: run
        value: https://ethereum-sepolia.publicnode.com
      - key: TELEGRAM_BOT_TOKEN
        scope: run
        value: YOUR_BOT_TOKEN_HERE
      - key: PORT
        scope: run
        value: 3001